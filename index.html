<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Search Elite - Pink Edition</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #fb7185 0%, #db2777 100%);
            --secondary: #9d174d;
            --success: #ec4899;
            --bg: #fdf2f8;
            --card: #ffffff;
            --text-dark: #831843;
            --highlight: #fce7f3;
            --accent: #f472b6;
            --cell-size: 44px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* Mencegah zoom/scroll saat menyentuh grid */
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(#f9a8d4 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .container {
            display: flex;
            flex-direction: row;
            gap: 20px;
            background: var(--card);
            padding: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(219, 39, 119, 0.1);
            max-width: 1100px;
            width: 100%;
            border: 4px solid #fbcfe8;
        }

        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
            padding: 20px 0;
        }

        #game-screen {
            display: none;
            flex-direction: row;
            gap: 30px;
            width: 100%;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--secondary);
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .theme-card {
            background: #fff1f2;
            border: 2px solid #fbcfe8;
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .game-board-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, var(--cell-size));
            gap: 4px;
            background: #fff1f2;
            padding: 10px;
            border-radius: 16px;
            border: 2px solid #fce7f3;
            margin: 10px 0;
            user-select: none;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: calc(var(--cell-size) * 0.45);
            border-radius: 8px;
            border: 1px solid #fbcfe8;
            color: #db2777;
            pointer-events: auto; /* Memastikan bisa diklik */
        }

        .cell.selected { 
            background-color: #fce7f3; 
            color: #9d174d; 
            border-color: #f472b6; 
        }

        .cell.found { 
            background: var(--primary-gradient); 
            color: white; 
            border-color: #be185d; 
        }

        .meta-panel {
            width: 260px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border-left: 2px dashed #fbcfe8;
            padding-left: 20px;
        }

        .stat-card {
            background: #fff1f2;
            border-radius: 16px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            text-align: center;
        }

        .word-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 6px; 
            list-style: none; 
            padding: 0; 
            justify-content: center;
        }
        
        .word-item { 
            padding: 5px 10px; 
            background: #fff; 
            border: 1px solid #fbcfe8; 
            border-radius: 20px; 
            font-weight: 700; 
            font-size: 0.75rem; 
            color: #db2777; 
        }
        
        .word-item.found { 
            background-color: #fdf2f8; 
            color: #f472b6; 
            text-decoration: line-through;
            opacity: 0.6;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
        }

        @media (max-width: 850px) {
            :root {
                --cell-size: 8.8vw;
            }
            .container { flex-direction: column; }
            #game-screen { flex-direction: column; }
            .meta-panel { 
                width: 100%; 
                border-left: none; 
                border-top: 2px dashed #fbcfe8; 
                padding: 15px 0 0 0; 
            }
            .theme-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-screen">
        <h1>Word Search Elite</h1>
        <p class="subtitle">Tema Pink Spesial: Pilih petualanganmu! ✨</p>
        <div class="theme-grid">
            <div class="theme-card" onclick="startGame('tech')"><span>🌸</span><b>Teknologi</b></div>
            <div class="theme-card" onclick="startGame('animals')"><span>🐰</span><b>Hewan</b></div>
            <div class="theme-card" onclick="startGame('food')"><span>🍓</span><b>Makanan</b></div>
            <div class="theme-card" onclick="startGame('nature')"><span>🌺</span><b>Alam</b></div>
        </div>
    </div>

    <div id="game-screen">
        <div class="game-board-container">
            <h1 id="active-title">Cari Kata</h1>
            <div id="grid"></div>
        </div>
        <div class="meta-panel">
            <div class="stat-card">
                <div><small>Waktu</small><div id="timer" style="font-weight: 800;">00:00</div></div>
                <div><small>Kata</small><div id="found-count" style="font-weight: 800;">0/6</div></div>
                <div><small>Skor</small><div id="score" style="font-weight: 800;">0</div></div>
            </div>
            <ul class="word-list" id="word-list"></ul>
            <div class="btn-group">
                <button class="btn-action" style="background: #fff1f2; color: #db2777;" onclick="backToMenu()">Menu</button>
                <button class="btn-action" onclick="refreshBoard()">Acak</button>
            </div>
        </div>
    </div>
</div>

<script>
    const THEMES = {
        tech: { words: ["PYTHON", "HTML", "REACT", "GEMINI", "CODING", "LOGIKA", "CSS", "ARRAY", "OBJECT", "EDITOR"] },
        animals: { words: ["GAJAH", "KUCING", "JERAPAH", "HARIMAU", "SINGA", "KELINCI", "MONYET", "LUWAK", "ZIBRA", "PANDA"] },
        food: { words: ["BURGER", "PIZZA", "DONAT", "PASTA", "NASI", "SOTO", "SATE", "KEBAB", "TACO", "RAMEN"] },
        nature: { words: ["GUNUNG", "PANTAI", "SUNGAI", "POHON", "BUNGA", "HUJAN", "AWAN", "HUTAN", "DANAU", "LANGIT"] }
    };

    const GRID_SIZE = 10;
    let currentThemeKey = '';
    let selectedWords = [];
    let foundWords = [];
    let gridData = [];
    let isDragging = false;
    let currentSelection = [];
    let startTime, timerInterval, score = 0;

    function startGame(themeKey) {
        currentThemeKey = themeKey;
        document.getElementById('menu-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        refreshBoard();
    }

    function backToMenu() {
        clearInterval(timerInterval);
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('game-screen').style.display = 'none';
    }

    function refreshBoard() {
        clearInterval(timerInterval);
        const gridEl = document.getElementById('grid');
        gridEl.innerHTML = '';
        document.getElementById('word-list').innerHTML = '';
        foundWords = []; score = 0;
        updateMeta();
        
        selectedWords = [...THEMES[currentThemeKey].words].sort(() => 0.5 - Math.random()).slice(0, 6);
        gridData = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(''));
        selectedWords.forEach(placeWord);
        
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let r = 0; r < GRID_SIZE; r++) {
            for (let c = 0; c < GRID_SIZE; c++) {
                if (gridData[r][c] === '') gridData[r][c] = chars[Math.floor(Math.random() * 26)];
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = gridData[r][c];
                cell.dataset.r = r; cell.dataset.c = c;
                gridEl.appendChild(cell);
            }
        }

        // Event Listeners Gabungan (Mouse & Touch)
        gridEl.addEventListener('mousedown', handleStart);
        gridEl.addEventListener('touchstart', handleStart, {passive: false});
        
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove, {passive: false});
        
        window.addEventListener('mouseup', handleEnd);
        window.addEventListener('touchend', handleEnd);

        selectedWords.forEach(word => {
            const li = document.createElement('li');
            li.className = 'word-item';
            li.id = 'word-' + word;
            li.textContent = word;
            document.getElementById('word-list').appendChild(li);
        });

        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function getTargetCell(e) {
        let x, y;
        if (e.touches) {
            x = e.touches[0].clientX;
            y = e.touches[0].clientY;
        } else {
            x = e.clientX;
            y = e.clientY;
        }
        const el = document.elementFromPoint(x, y);
        return el && el.classList.contains('cell') ? el : null;
    }

    function handleStart(e) {
        const cell = getTargetCell(e);
        if (cell) {
            isDragging = true;
            currentSelection = [];
            addCellToSelection(cell);
            if (e.cancelable) e.preventDefault();
        }
    }

    function handleMove(e) {
        if (!isDragging) return;
        const cell = getTargetCell(e);
        if (cell) {
            const last = currentSelection[currentSelection.length - 1];
            if (last.el !== cell) {
                // Hanya tambah jika bersebelahan
                const r = parseInt(cell.dataset.r);
                const c = parseInt(cell.dataset.c);
                const dr = Math.abs(r - last.r);
                const dc = Math.abs(c - last.c);
                if (dr <= 1 && dc <= 1) {
                    addCellToSelection(cell);
                }
            }
        }
        if (e.cancelable) e.preventDefault();
    }

    function addCellToSelection(el) {
        const r = parseInt(el.dataset.r);
        const c = parseInt(el.dataset.c);
        if (!currentSelection.find(s => s.r === r && s.c === c)) {
            currentSelection.push({r, c, el});
            el.classList.add('selected');
        }
    }

    function handleEnd() {
        if (!isDragging) return;
        isDragging = false;
        const word = currentSelection.map(s => s.el.textContent).join('');
        const revWord = word.split('').reverse().join('');
        
        let match = "";
        if (selectedWords.includes(word)) match = word;
        else if (selectedWords.includes(revWord)) match = revWord;

        if (match && !foundWords.includes(match)) {
            foundWords.push(match);
            currentSelection.forEach(s => {
                s.el.classList.remove('selected');
                s.el.classList.add('found');
            });
            document.getElementById('word-' + match).classList.add('found');
            score += match.length * 10;
            updateMeta();
            if (foundWords.length === selectedWords.length) {
                clearInterval(timerInterval);
                setTimeout(() => alert("💖 Hebat! Kamu menang!"), 100);
            }
        } else {
            currentSelection.forEach(s => s.el.classList.remove('selected'));
        }
        currentSelection = [];
    }

    function placeWord(word) {
        let placed = false;
        while (!placed) {
            const dir = [[0,1], [1,0], [1,1]][Math.floor(Math.random()*3)];
            const r = Math.floor(Math.random() * (dir[0] === 0 ? GRID_SIZE : GRID_SIZE - word.length));
            const c = Math.floor(Math.random() * (dir[1] === 0 ? GRID_SIZE : GRID_SIZE - word.length));
            let fit = true;
            for(let i=0; i<word.length; i++) {
                const char = gridData[r + i*dir[0]][c + i*dir[1]];
                if (char !== '' && char !== word[i]) { fit = false; break; }
            }
            if (fit) {
                for(let i=0; i<word.length; i++) gridData[r + i*dir[0]][c + i*dir[1]] = word[i];
                placed = true;
            }
        }
    }

    function updateTimer() {
        const sec = Math.floor((Date.now() - startTime)/1000);
        document.getElementById('timer').textContent = `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
    }

    function updateMeta() {
        document.getElementById('found-count').textContent = `${foundWords.length}/6`;
        document.getElementById('score').textContent = score;
    }
</script>
</body>
</html>
